    .waveform2{ stroke: #b87d6d; stroke-width: 5; fill: none; stroke-linecap: round; opacity: 0.7; }
    .labeltext{ font-family: monospace; font-size: 38px; font-weight: 500; fill: #e8d5c4; letter-spacing: 1px; }
    .sublabel { font-family: monospace; font-size: 20px; fill: #d4a5a5; font-weight: 400; letter-spacing: 3px; }
